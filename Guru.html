        /* ═══════════ HOOKS ═══════════ */
        function useInView(threshold = 0.15) {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const obs = new IntersectionObserver(([e]) => {
                    if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
                }, { threshold });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, [threshold]);
            return [ref, visible];
        }

        /* ═══════════ PARTICLE CANVAS ═══════════ */
        function ParticleCanvas() {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let W = canvas.width = window.innerWidth;
                let H = canvas.height = window.innerHeight;
                let raf;
                const particles = Array.from({ length: 60 }, () => ({
                    x: Math.random() * W, y: Math.random() * H,
                    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 1.5 + 0.3,
                    alpha: Math.random() * 0.4 + 0.1,
                    gold: Math.random() > 0.7,
                }));
                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = p.gold ? `rgba(240,165,0,${p.alpha})` : `rgba(34,211,238,${p.alpha})`;
                        ctx.fill();
                    });
                    // connection lines
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 100) {
                                ctx.beginPath();
                                ctx.strokeStyle = `rgba(90,130,200,${0.08 * (1 - dist / 100)})`;
                                ctx.lineWidth = 0.5;
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                    raf = requestAnimationFrame(draw);
                }
                draw();
                const resize = () => {
                    W = canvas.width = window.innerWidth;
                    H = canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
            }, []);
            return <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }} />;
        }

        /* ═══════════ TYPEWRITER ═══════════ */
        function Typewriter({ words, speed = 80, pause = 1800 }) {
            const [text, setText] = useState('');
            const [wIdx, setWIdx] = useState(0);
            const [charIdx, setCharIdx] = useState(0);
            const [deleting, setDeleting] = useState(false);
            useEffect(() => {
                const word = words[wIdx];
                let timeout;
                if (!deleting && charIdx <= word.length) {
                    timeout = setTimeout(() => {
                        setText(word.slice(0, charIdx));
                        setCharIdx(c => c + 1);
                    }, speed);
                } else if (!deleting && charIdx > word.length) {
                    timeout = setTimeout(() => setDeleting(true), pause);
                } else if (deleting && charIdx >= 0) {
                    timeout = setTimeout(() => {
                        setText(word.slice(0, charIdx));
                        setCharIdx(c => c - 1);
                    }, speed / 2);
                } else {
                    setDeleting(false);
                    setWIdx(i => (i + 1) % words.length);
                }
                return () => clearTimeout(timeout);
            }, [text, charIdx, deleting, wIdx, words, speed, pause]);
            return (
                <span style={{ color: 'var(--gold)', fontFamily: 'var(--font-mono)', fontSize: 'clamp(1rem,2.5vw,1.25rem)' }}>
                    {text}<span style={{ animation: 'blink 1s infinite', color: 'var(--cyan)' }}>|</span>
                </span>
            );
        }

                                border: '1px solid rgba(34,211,238,0.3)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: '2rem',
                            }}>🎓</div>
                            <div style={{ flex: 1, minWidth: 220 }}>
                                <h3 style={{
                                    fontFamily: 'var(--font-display)', fontSize: '1.4rem', fontWeight: 700,
                                    color: 'var(--text)', marginBottom: '0.4rem'
                                }}>
                                    B.Tech – Electronics &amp; Communication Engineering
                                </h3>
                                <div style={{ color: 'var(--cyan)', fontWeight: 600, fontSize: '0.9rem', marginBottom: '0.3rem' }}>
                                    JNTU Anantapur University, Andhra Pradesh
                                </div>
                                <div style={{ fontFamily: 'var(--font-mono)', fontSize: '0.78rem', color: 'var(--muted)', marginBottom: '1.2rem' }}>
                                    2017 – 2021
                                </div>
                                <p style={{ fontSize: '0.88rem', color: 'var(--sub)', lineHeight: 1.7 }}>
                                    Electronics &amp; Communication foundation provided strong analytical and systems-thinking skills,
                                    enabling confident transition into full-stack software engineering and enterprise application development.
                                </p>
                            </div>
                        </div>
                    </div>
                </Section>
            );
        }

        /* ═══════════ CONTACT ═══════════ */
        function Contact() {
            const [form, setForm] = useState({ name: '', email: '', message: '' });
            const [sent, setSent] = useState(false);
            const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));
            const handleSubmit = e => {
                e.preventDefault();
                setSent(true);
                setTimeout(() => setSent(false), 4000);
                setForm({ name: '', email: '', message: '' });
            };
            const inputStyle = {
                width: '100%', padding: '12px 16px', borderRadius: 8,
                background: 'rgba(255,255,255,0.04)',
                border: '1px solid rgba(91,114,153,0.25)',
                color: 'var(--text)', fontSize: '0.9rem', fontFamily: 'var(--font-body)',
                outline: 'none', transition: 'border-color 0.2s,background 0.2s',
            };
            const labelStyle = {
                display: 'block', fontSize: '0.78rem', fontFamily: 'var(--font-mono)',
                color: 'var(--sub)', letterSpacing: '0.08em', marginBottom: '8px',
            };

            return (
                <Section id="contact" style={{ borderTop: '1px solid var(--border)' }}>
                    <div style={{ maxWidth: 900, margin: '0 auto' }}>
                        <Heading number="06" title="Get In Touch" sub="CONTACT" />

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(280px,1fr))', gap: '3rem', alignItems: 'start' }}>
                            {/* Left info */}
                            <div>
                                <h3 style={{
                                    fontFamily: 'var(--font-display)', fontSize: '1.6rem', fontWeight: 600,
                                    color: 'var(--text)', marginBottom: '1rem', lineHeight: 1.3
                                }}>
                                    Open to New<br /><span style={{ color: 'var(--gold)' }}>Opportunities</span>
                                </h3>
                                <p style={{ color: 'var(--sub)', lineHeight: 1.8, marginBottom: '2rem', fontSize: '0.9rem' }}>
                                    React.js developer with 3+ years enterprise experience. Available for full-time roles,
                                    contract projects, and collaborations in the MERN/Java stack space.
                                </p>

                                {[
                                    { icon: '📧', label: 'Email', value: 'mohanguru733@gmail.com', color: 'var(--gold)' },
                                    { icon: '📱', label: 'Phone', value: '+91 91822 15100', color: 'var(--cyan)' },
                                    { icon: '📍', label: 'Location', value: 'Hyderabad, Telangana', color: 'var(--gold)' },
                                ].map(c => (
                                    <div key={c.label} style={{
                                        display: 'flex', alignItems: 'center', gap: '12px',
                                        padding: '12px 16px', marginBottom: '10px',
                                        background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)',
                                        borderRadius: 10, transition: 'all 0.25s', cursor: 'default',
                                    }}
                                        onMouseEnter={e => { e.currentTarget.style.borderColor = c.color + '40'; e.currentTarget.style.transform = 'translateX(6px)' }}
                                        onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.transform = '' }}
                                    >
                                        <span style={{ fontSize: '1.2rem' }}>{c.icon}</span>
                                        <div>
                                            <div style={{ fontSize: '0.72rem', color: 'var(--muted)', fontFamily: 'var(--font-mono)', letterSpacing: '0.08em' }}>{c.label}</div>
                                            <div style={{ fontSize: '0.88rem', color: c.color, fontWeight: 500 }}>{c.value}</div>
                                        </div>
                                    </div>
                                ))}

                                {/* Core competencies */}
                                <div style={{ marginTop: '1.5rem' }}>
                                    <div style={{
                                        fontSize: '0.72rem', fontFamily: 'var(--font-mono)', color: 'var(--muted)',
                                        letterSpacing: '0.1em', marginBottom: '10px'
                                    }}>CORE STRENGTHS</div>
                                    {['React.js · MUI · REST APIs', 'Spring Boot · JWT · MySQL', 'Agile · GitLab CI/CD', 'RBAC · Enterprise Workflows'].map(s => (
                                        <div key={s} style={{
                                            display: 'flex', alignItems: 'center', gap: '8px',
                                            fontSize: '0.82rem', color: 'var(--sub)', marginBottom: '6px',
                                        }}>
                                            <span style={{ color: 'var(--gold)', fontSize: '0.65rem' }}>◆</span>{s}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Form */}
                            <div style={{
                                background: 'linear-gradient(135deg,var(--card),rgba(15,29,51,0.7))',
                                border: '1px solid var(--border)', borderRadius: 18, padding: '2rem',
                            }}>
                                {sent ? (
                                    <div style={{
                                        textAlign: 'center', padding: '3rem 1rem',
                                        animation: 'scalePop 0.4s ease forwards',
                                    }}>
                                        <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>✅</div>
                                        <h4 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem', color: 'var(--gold)', marginBottom: '0.5rem' }}>
                                            Message Sent!
                                        </h4>
                                        <p style={{ color: 'var(--sub)', fontSize: '0.9rem' }}>Thanks for reaching out. I'll respond within 24 hours.</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubmit} autoComplete="off">
                                        <h4 style={{
                                            fontFamily: 'var(--font-display)', fontSize: '1.2rem', fontWeight: 600,
                                            color: 'var(--text)', marginBottom: '1.5rem'
                                        }}>Send a Message</h4>

                                        <div style={{ marginBottom: '1.2rem' }}>
                                            <label style={labelStyle}>YOUR NAME</label>
                                            <input name="name" value={form.name} onChange={handleChange} required
                                                placeholder="John Doe" style={inputStyle}
                                                onFocus={e => { e.target.style.borderColor = 'var(--gold)'; e.target.style.background = 'rgba(240,165,0,0.04)' }}
                                                onBlur={e => { e.target.style.borderColor = 'rgba(91,114,153,0.25)'; e.target.style.background = 'rgba(255,255,255,0.04)' }}
                                            />
                                        </div>
                                        <div style={{ marginBottom: '1.2rem' }}>
                                            <label style={labelStyle}>EMAIL ADDRESS</label>
                                            <input name="email" type="email" value={form.email} onChange={handleChange} required
                                                placeholder="john@example.com" style={inputStyle}
                                                onFocus={e => { e.target.style.borderColor = 'var(--cyan)'; e.target.style.background = 'rgba(34,211,238,0.04)' }}
                                                onBlur={e => { e.target.style.borderColor = 'rgba(91,114,153,0.25)'; e.target.style.background = 'rgba(255,255,255,0.04)' }}
                                            />
                                        </div>
                                        <div style={{ marginBottom: '1.5rem' }}>
                                            <label style={labelStyle}>MESSAGE</label>
                                            <textarea name="message" value={form.message} onChange={handleChange} required
                                                placeholder="I'd like to discuss an opportunity..." rows={5}
                                                style={{ ...inputStyle, resize: 'vertical', minHeight: 120 }}
                                                onFocus={e => { e.target.style.borderColor = 'var(--gold)'; e.target.style.background = 'rgba(240,165,0,0.04)' }}
                                                onBlur={e => { e.target.style.borderColor = 'rgba(91,114,153,0.25)'; e.target.style.background = 'rgba(255,255,255,0.04)' }}
                                            />
                                        </div>
                                        <button type="submit" style={{
                                            width: '100%', padding: '14px', borderRadius: 8, border: 'none', cursor: 'pointer',
                                            background: 'linear-gradient(135deg,var(--gold),#d49200)',
                                            color: '#06111f', fontWeight: 700, fontSize: '0.95rem', fontFamily: 'var(--font-body)',
                                            letterSpacing: '0.04em', boxShadow: '0 6px 24px rgba(240,165,0,0.35)',
                                            transition: 'all 0.25s',
                                        }}
                                            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 10px 36px rgba(240,165,0,0.5)' }}
                                            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 6px 24px rgba(240,165,0,0.35)' }}
                                        >Send Message →</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </Section>
            );
        }

        /* ═══════════ FOOTER ═══════════ */
        function Footer() {
            return (
                <footer style={{
                    borderTop: '1px solid var(--border)',
                    padding: '2rem clamp(1rem,6vw,4rem)',
                    background: 'var(--surface)',
                    display: 'flex', flexWrap: 'wrap', gap: '1rem',
                    justifyContent: 'space-between', alignItems: 'center',
                }}>
                    <div>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.1rem', color: 'var(--text)', marginBottom: '2px' }}>
                            Guru Mohan Thetaneela
                        </div>
                        <div style={{ fontSize: '0.75rem', color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>
                            React.js Developer · Full Stack Engineer
                        </div>
                    </div>
                    <div style={{ fontSize: '0.8rem', color: 'var(--muted)', textAlign: 'center' }}>
                        Built with <span style={{ color: 'var(--gold)' }}>React.js</span> &amp; crafted with{' '}
                        <span style={{ color: '#ef4444' }}>♥</span>
                    </div>
                    <div style={{ fontSize: '0.78rem', color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>
                        Hyderabad · 2025
                    </div>
                </footer>
            );
        }

        /* ═══════════ APP ═══════════ */
        function App() {
            return (
                <div>
                    <Navbar />
                    <Hero />
                    <About />
                    <Skills />
                    <Experience />
                    <Projects />
                    <Education />
                    <Contact />
                    <Footer />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
