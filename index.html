        /* ═══════════ HOOKS ═══════════ */
        function useInView(threshold = 0.15) {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const obs = new IntersectionObserver(([e]) => {
                    if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
                }, { threshold });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, [threshold]);
            return [ref, visible];
        }

        /* ═══════════ PARTICLE CANVAS ═══════════ */
        function ParticleCanvas() {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let W = canvas.width = window.innerWidth;
                let H = canvas.height = window.innerHeight;
                let raf;
                const particles = Array.from({ length: 60 }, () => ({
                    x: Math.random() * W, y: Math.random() * H,
                    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 1.5 + 0.3,
                    alpha: Math.random() * 0.4 + 0.1,
                    gold: Math.random() > 0.7,
                }));
                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = p.gold ? `rgba(240,165,0,${p.alpha})` : `rgba(34,211,238,${p.alpha})`;
                        ctx.fill();
                    });
                    // connection lines
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 100) {
                                ctx.beginPath();
                                ctx.strokeStyle = `rgba(90,130,200,${0.08 * (1 - dist / 100)})`;
                                ctx.lineWidth = 0.5;
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                    raf = requestAnimationFrame(draw);
                }
                draw();
                const resize = () => {
                    W = canvas.width = window.innerWidth;
                    H = canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
            }, []);
            return <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }} />;
        }

        /* ═══════════ TYPEWRITER ═══════════ */
        function Typewriter({ words, speed = 80, pause = 1800 }) {
            const [text, setText] = useState('');
            const [wIdx, setWIdx] = useState(0);
            const [charIdx, setCharIdx] = useState(0);
            const [deleting, setDeleting] = useState(false);
            useEffect(() => {
                const word = words[wIdx];
                let timeout;
                if (!deleting && charIdx <= word.length) {
                    timeout = setTimeout(() => {
                        setText(word.slice(0, charIdx));
                        setCharIdx(c => c + 1);
                    }, speed);
                } else if (!deleting && charIdx > word.length) {
                    timeout = setTimeout(() => setDeleting(true), pause);
                } else if (deleting && charIdx >= 0) {
                    timeout = setTimeout(() => {
                        setText(word.slice(0, charIdx));
                        setCharIdx(c => c - 1);
                    }, speed / 2);
                } else {
                    setDeleting(false);
                    setWIdx(i => (i + 1) % words.length);
                }
                return () => clearTimeout(timeout);
            }, [text, charIdx, deleting, wIdx, words, speed, pause]);
            return (
                <span style={{ color: 'var(--gold)', fontFamily: 'var(--font-mono)', fontSize: 'clamp(1rem,2.5vw,1.25rem)' }}>
                    {text}<span style={{ animation: 'blink 1s infinite', color: 'var(--cyan)' }}>|</span>
                </span>
            );
        }

        /* ─────────────────────── TYPED TEXT ─────────────────────── */
        function Typed({ texts }) {
            const [cur, setCur] = React.useState('');
            const [idx, setIdx] = React.useState(0);
            const [del, setDel] = React.useState(false);
            React.useEffect(() => {
                const t = texts[idx];
                let tm;
                if (!del && cur.length < t.length) tm = setTimeout(() => setCur(t.slice(0, cur.length + 1)), 75);
                else if (!del && cur.length === t.length) tm = setTimeout(() => setDel(true), 2200);
                else if (del && cur.length > 0) tm = setTimeout(() => setCur(cur.slice(0, -1)), 38);
                else if (del) { setDel(false); setIdx((idx + 1) % texts.length); }
                return () => clearTimeout(tm);
            }, [cur, del, idx, texts]);
            return <span><span style={{ color: '#00D4FF' }}>{cur}</span><span className="cursor" /></span>;
        }

        /* ─────────────────────── HOOKS ─────────────────────── */
        function useReveal() {
            React.useEffect(() => {
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            e.target.classList.add('vis');
                            e.target.querySelectorAll('.sb-fill').forEach(b => { b.style.width = b.dataset.w });
                        }
                    });
                }, { threshold: 0.12 });
                document.querySelectorAll('.reveal,.reveal-l,.reveal-r,.reveal-scale').forEach(el => obs.observe(el));
                return () => obs.disconnect();
            }, []);
        }

        function useScrollProgress() {

                window.addEventListener('scroll', fn);

        /* ─────────────────────── SKILLS ─────────────────────── */
        function Skills() {
            const cats = Object.keys(SKILLS);
            const [active, setActive] = React.useState('Frontend');
            const [filled, setFilled] = React.useState(false);
            const sectionRef = React.useRef(null);

            /* Re-trigger bar animation whenever tab changes */
            React.useEffect(() => {
                setFilled(false);
                const t = setTimeout(() => setFilled(true), 120);
                return () => clearTimeout(t);
            }, [active]);

            /* Trigger on first scroll into view */
            React.useEffect(() => {
                const el = sectionRef.current;
                if (!el) return;
                const obs = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting) { setFilled(false); setTimeout(() => setFilled(true), 120); }
                }, { threshold: 0.15 });
                obs.observe(el);
                return () => obs.disconnect();
            }, []);

            const switchTab = (c) => { setActive(c); };

            return (
                <Box id="skills" ref={sectionRef} sx={{ py: { xs: 10, md: 14 }, background: '#060D1A' }}>
                    <Container maxWidth="lg">
                        <SecHead label="// technical skills" title="My Tech Stack" sub="Technologies I build with every day" />
                        {/* Category tabs */}
                        <Box className="reveal" sx={{ display: 'flex', gap: 1, justifyContent: 'center', flexWrap: 'wrap', mb: 5 }}>
                            {cats.map(c => (
                                <button key={c} className={`s-tab${active === c ? ' act' : ''}`} onClick={() => switchTab(c)}>{c}</button>
                            ))}
                        </Box>
                        {/* Skill bars — animation driven by `filled` state, not IntersectionObserver */}
                        <Grid container spacing={3}>
                            {SKILLS[active].map((s, i) => (
                                <Grid item xs={12} sm={6} key={`${active}-${s.n}`}>
                                    <Box className="glass card-hover"
                                        style={{

                                            padding: '18px 20px', borderRadius: 12, border: '1px solid rgba(255,255,255,0.06)',

                                        <div className="sb-wrap">
                                            <div style={{
                                                height: '100%', borderRadius: 3,

                                </Grid>
                            ))}
                        </Grid>
                        {/* All tech chips */}
                        <Box className="reveal" sx={{ mt: 7, textAlign: 'center' }}>
